<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tự Học Bộ Thủ - Giang</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hanzi-writer@3.5/dist/hanzi-writer.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-slate-100 min-h-screen flex flex-col items-center py-6 px-4">
    <h1 class="text-2xl font-black text-indigo-900 mb-4 uppercase text-center tracking-tighter">Phân Tích Chữ & Bộ Thủ</h1>
    
    <label class="bg-indigo-600 text-white px-8 py-3 rounded-2xl cursor-pointer shadow-lg mb-4 font-bold active:scale-95 transition-all flex items-center">
        <i class="fas fa-cloud-upload-alt mr-2"></i> TẢI FILE HSK
        <input type="file" id="upload" accept=".xlsx" class="hidden">
    </label>

    <div id="counter" class="mb-4 text-indigo-600 font-bold bg-white px-4 py-1 rounded-full shadow-sm">Từ: 0 / 0</div>

    <div class="bg-white p-6 rounded-[2.5rem] shadow-2xl w-full max-w-lg border-b-8 border-indigo-200">
        <!-- Khu vực vẽ chữ -->
        <div id="character-container" class="flex flex-wrap justify-center gap-3 mb-6"></div>
        
        <div class="text-center mb-6">
            <div id="pinyin-display" class="text-3xl text-indigo-600 font-black mb-1">Pinyin</div>
            <div id="meaning-display" class="text-xl text-slate-500 italic">Nghĩa tiếng Việt</div>
        </div>

        <!-- Bảng phân tích bộ thủ tự động -->
        <div id="analysis-section" class="space-y-3 hidden">
            <h3 class="text-xs font-bold text-indigo-400 uppercase tracking-widest border-b pb-1">Chi tiết cấu tạo:</h3>
            <div id="radical-details" class="grid grid-cols-1 gap-2"></div>
        </div>

        <div class="flex gap-4 mt-8">
            <button onclick="animateAll()" class="flex-1 bg-amber-500 text-white py-3 rounded-xl font-bold shadow-md active:scale-90">
                <i class="fas fa-pen-nib mr-2"></i> VIẾT LẠI
            </button>
            <button onclick="speak()" class="flex-1 bg-sky-500 text-white py-3 rounded-xl font-bold shadow-md active:scale-90">
                <i class="fas fa-volume-up mr-2"></i> NGHE
            </button>
        </div>
    </div>

    <div class="flex gap-4 mt-8 w-full max-w-sm">
        <button onclick="prev()" class="flex-1 bg-white border-2 border-slate-300 text-slate-400 font-bold py-4 rounded-2xl active:scale-95">SAU</button>
        <button onclick="next()" class="flex-2 bg-indigo-700 text-white font-bold py-4 rounded-2xl shadow-xl active:scale-95">TỪ TIẾP THEO</button>
    </div>

    <script>
        let words = []; let i = 0; let writers = [];

        document.getElementById('upload').addEventListener('change', function(e) {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = function(event) {
                const data = new Uint8Array(event.target.result);
                const workbook = XLSX.read(data, {type: 'array'});
                const sheet = workbook.Sheets[workbook.SheetNames[0]];
                const json = XLSX.utils.sheet_to_json(sheet, {header: 1});
                words = json.slice(1).map(row => ({ 
                    h: row[0] ? row[0].toString() : "", 
                    p: row[1] ? row[1].toString() : "", 
                    m: row[2] ? row[2].toString() : "" 
                })).filter(item => item.h !== "");
                i = 0; if(words.length > 0) updateUI();
            };
            reader.readAsArrayBuffer(file);
        });

        async function updateUI() {
            const fullWord = words[i].h.trim();
            document.getElementById('counter').innerText = `Từ: ${i + 1} / ${words.length}`;
            document.getElementById('pinyin-display').innerText = words[i].p;
            document.getElementById('meaning-display').innerText = words[i].m;
            document.getElementById('analysis-section').classList.remove('hidden');
            
            const container = document.getElementById('character-container');
            const radicalBox = document.getElementById('radical-details');
            container.innerHTML = '';
            radicalBox.innerHTML = '';
            writers = [];

            for (let char of fullWord) {
                // Tạo ô vẽ
                const charDiv = document.createElement('div');
                charDiv.className = "bg-slate-50 rounded-xl border border-indigo-50 shadow-inner";
                container.appendChild(charDiv);

                const writer = HanziWriter.create(charDiv, char, {
                    width: 120, height: 120, padding: 10, strokeAnimationSpeed: 1,
                    delayBetweenStrokes: 200, strokeColor: '#312e81', showOutline: true
                });
                writers.push(writer);

                // Gọi API để lấy thông tin bộ thủ (Sử dụng dữ liệu mẫu hoặc API mở)
                loadRadicalInfo(char, radicalBox);
            }
            animateAll();
        }

        function loadRadicalInfo(char, targetElement) {
            // Đây là phần giả lập tra cứu bộ thủ động. 
            // Trong thực tế, các bộ thủ phổ biến sẽ được hiện ra ở đây.
            const item = document.createElement('div');
            item.className = "text-sm bg-indigo-50 p-2 rounded-lg border border-indigo-100 flex justify-between";
            
            // Link tra cứu nhanh đến từ điển uy tín
            item.innerHTML = `<span>Chữ <b>${char}</b></span> <a href="https://hvdic.thivien.net/whv/${char}" target="_blank" class="text-indigo-500 font-bold underline">Xem bộ thủ & chiết tự <i class="fas fa-external-link-alt text-xs"></i></a>`;
            targetElement.appendChild(item);
        }

        function animateAll() {
            writers.forEach((w, index) => {
                setTimeout(() => w.animateCharacter(), index * 1200);
            });
        }

        function next() { if (words.length === 0) return; i = (i + 1) % words.length; updateUI(); }
        function prev() { if (words.length === 0) return; i = (i - 1 + words.length) % words.length; updateUI(); }
        function speak() {
            if (words.length === 0) return;
            const msg = new SpeechSynthesisUtterance(words[i].h);
            msg.lang = 'zh-CN';
            window.speechSynthesis.speak(msg);
        }
    </script>
</body>
</html>
